<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Patuxai Pops 后台">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f6f8fb">
  <title>Patuxai Pops 后台统计</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/app-icon-180.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="locked">
  <div class="install-hint" id="installHint" hidden>
    <strong>安装到 iPad</strong>
    <span>点 Safari 分享按钮，选择“添加到主屏幕”。</span>
    <button type="button" id="installHintClose" aria-label="关闭安装提示">×</button>
  </div>

  <section class="auth-screen" id="authScreen">
    <form class="auth-card" id="loginForm">
      <div>
        <h1>登录后台</h1>
        <div class="subtle">登录后查看统计、管理库存和日结。</div>
      </div>
      <input id="emailInput" type="email" autocomplete="username" placeholder="邮箱">
      <input id="passwordInput" type="password" autocomplete="current-password" placeholder="密码">
      <button class="button primary" type="submit">登录</button>
      <div class="auth-error" id="authError"></div>
    </form>
  </section>

  <main class="page">
    <section class="topbar">
      <div>
        <h1>后台统计</h1>
        <div class="subtle"><span id="rangeText">Patuxai Pops 销售数据</span> · <span id="signedInAs"></span> · <span class="sync-badge online" id="syncBadge">在线</span></div>
      </div>
      <div class="actions">
        <a class="button" href="index.html">返回点单</a>
        <a class="button primary" href="#menuManagement">菜单管理</a>
        <button class="button" id="testConnection" type="button">测试连接</button>
        <button class="button primary" id="exportCsv">导出 CSV</button>
        <button class="button" id="logoutBtn">退出</button>
      </div>
    </section>

    <nav class="range" aria-label="统计范围">
      <button class="active" data-range="today">今天</button>
      <button data-range="7days">近 7 天</button>
      <button data-range="all">全部</button>
    </nav>

    <nav class="admin-shortcuts" aria-label="后台快捷入口">
      <a href="#menuManagement">菜单管理</a>
      <a href="#stockManagement">库存售罄</a>
      <a href="#inventoryMovementsPanel">库存记录</a>
      <a href="#closeoutPanel">日结</a>
      <a href="#ordersPanel">订单明细</a>
    </nav>

    <nav class="product-filters" id="productFilters" aria-label="产品筛选">
      <button data-product-filter="all">当前菜单</button>
      <button class="active" data-product-filter="active">上架中</button>
      <button data-product-filter="inactive">已下架</button>
      <button data-product-filter="low">低库存</button>
    </nav>

    <section class="stats" aria-label="汇总">
      <div class="card"><span>销售额</span><strong id="salesTotal">0 KIP</strong></div>
      <div class="card"><span>订单数</span><strong id="orderCount">0</strong></div>
      <div class="card"><span>售出数量</span><strong id="itemCount">0</strong></div>
      <div class="card"><span>客单价</span><strong id="avgOrder">0 KIP</strong></div>
    </section>

    <section class="panel anchor-panel" id="closeoutPanel">
      <h2>今日日结</h2>
      <div class="close-form">
        <label>
          系统现金
          <div class="close-value" id="expectedCash">0 KIP</div>
        </label>
        <label>
          实际现金
          <input class="field-input" id="actualCash" inputmode="decimal" type="number" min="0" step="1000" placeholder="输入现金金额">
        </label>
        <label>
          差额
          <div class="close-value" id="cashDiff">0 KIP</div>
        </label>
        <button class="button primary" id="saveCloseout">保存日结</button>
      </div>
      <div class="close-history" id="closeHistory">今天还没有日结记录。</div>
    </section>

    <section class="panel anchor-panel" id="menuManagement">
      <h2>菜单管理</h2>
      <div class="menu-editor" id="menuEditor"></div>
    </section>

    <section class="dashboard">
      <div class="panel">
        <h2>产品排行</h2>
        <div class="list" id="productRanking"></div>
      </div>
      <div class="panel">
        <h2>支付方式</h2>
        <div class="list" id="paymentSummary"></div>
      </div>
      <div class="panel">
        <h2>类别销售</h2>
        <div class="list" id="categorySummary"></div>
      </div>
      <div class="panel anchor-panel" id="stockManagement">
        <h2>库存与售罄</h2>
        <div class="stock-overview" id="stockOverview"></div>
        <div class="list" id="stockSummary"></div>
      </div>
    </section>

    <section class="panel anchor-panel" id="inventoryMovementsPanel">
      <h2>库存记录</h2>
      <div class="list" id="inventoryMovements"></div>
    </section>

    <section class="panel anchor-panel" id="ordersPanel">
      <h2>订单明细</h2>
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>时间</th>
            <th>内容</th>
            <th>付款</th>
            <th>金额</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script src="config.js"></script>
  <script src="common.js"></script>
  <script src="admin.js"></script>
</body>
</html>
