<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Patuxai Pops POS">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f6f8fb">
  <title>Patuxai Pops POS</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/app-icon-180.png">
  <link rel="stylesheet" href="styles.css?v=20260714-simplified-checkout-r4">
</head>
<body class="locked">
  <div class="install-hint" id="installHint" hidden>
    <strong>安装到 iPad</strong>
    <span>点 Safari 分享按钮，选择“添加到主屏幕”。</span>
    <button type="button" id="installHintClose" aria-label="关闭安装提示">×</button>
  </div>

  <section class="auth-screen" id="authScreen">
    <form class="auth-card" id="loginForm">
      <div>
        <h1>登录 POS</h1>
        <div class="subtle">使用 Supabase 中创建的账号登录。</div>
      </div>
      <input id="emailInput" type="email" autocomplete="username" placeholder="邮箱">
      <input id="passwordInput" type="password" autocomplete="current-password" placeholder="密码">
      <button class="button primary" type="submit">登录</button>
      <div class="auth-error" id="authError"></div>
    </form>
  </section>

  <section class="shift-screen" id="shiftScreen" hidden>
    <form class="shift-card" id="openShiftForm">
      <div>
        <span class="eyebrow">今日开班</span>
        <h1>开始营业</h1>
        <p>确认收银员和初始现金后，才可以开始正式收银。</p>
      </div>
      <div class="shift-date" id="shiftBusinessDate"></div>
      <label>收银员<input class="field-input" id="shiftCashierName" readonly></label>
      <label>初始现金 LAK<input class="field-input" id="openingCashInput" type="number" min="0" step="1000" value="0" required></label>
      <label>开班备注<input class="field-input" id="openingNoteInput" placeholder="可选"></label>
      <div class="shift-stock-note" id="shiftStockNote"></div>
      <button class="button primary" type="submit">开始营业</button>
    </form>
  </section>

  <div class="app">
    <main>
      <section class="topbar" aria-label="顶部">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div>
            <h1>Patuxai Pops POS</h1>
            <div class="subtle"><span id="todayText"></span> · <span id="signedInAs"></span> · <span class="shift-badge" id="shiftStatus">未开班</span> · <span class="sync-badge online" id="syncBadge">在线</span></div>
          </div>
        </div>
        <div class="toolbar">
          <input class="search" id="searchInput" type="search" placeholder="搜索商品或口味">
          <a class="ghost" href="admin.html">后台统计</a>
          <button class="ghost" id="closeShiftBtn" type="button" hidden>交班</button>
          <button class="ghost" id="logoutBtn">退出</button>
        </div>
      </section>

      <nav class="tabs" id="categoryTabs" aria-label="商品分类"></nav>
      <div class="stock-alert" id="lowStockAlert" hidden></div>
      <section class="grid" id="productGrid" aria-label="商品"></section>

      <section class="reports" aria-label="今日报表">
        <div class="stat"><span>今日销售额</span><strong id="salesTotal">0 KIP</strong></div>
        <div class="stat"><span>订单数</span><strong id="orderCount">0</strong></div>
        <div class="stat"><span>售出份数</span><strong id="itemCount">0</strong></div>
        <div class="stat"><span>热销</span><strong id="topItem">暂无</strong></div>
      </section>

      <section class="panel" aria-label="订单记录">
        <h2>今日订单</h2>
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>内容</th>
              <th>付款</th>
              <th>金额</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </section>
    </main>

    <aside aria-label="购物车">
      <div class="cart-head">
        <div>
          <h2>当前订单</h2>
          <span class="cart-count" id="cartCount">0 件</span>
        </div>
        <button class="ghost" id="clearCart">清空</button>
      </div>
      <div class="cart-list" id="cartList"></div>
      <div class="upsell-hint" id="upsellHint" hidden></div>
      <div class="checkout">
        <div class="summary">
          <div class="summary-detail"><span>小计</span><strong id="subtotal">0 KIP</strong></div>
          <div class="summary-detail"><span>折扣</span><strong id="discountText">0 KIP</strong></div>
          <div class="total"><span>应收</span><strong id="grandTotal">0 KIP</strong></div>
        </div>
        <div class="promotion-applied" id="promotionApplied" hidden></div>
        <div class="pay-methods" id="payMethods">
          <button class="pay active" data-pay="cash">Cash</button>
          <button class="pay" data-pay="qr">QR</button>
          <button class="pay" data-pay="bank_transfer">转账</button>
          <details class="checkout-more" id="checkoutMore">
            <summary>更多选项</summary>
            <div class="more-pay-methods">
              <button class="pay" data-pay="mixed">混合支付</button>
              <button class="pay" data-pay="complimentary">赠送</button>
              <button class="pay" data-pay="other">其他支付</button>
            </div>
            <div class="advanced-order-fields">
              <label class="discount-row" for="discountInput">
                <span>手动折扣</span>
                <input class="field-input" id="discountInput" inputmode="decimal" type="number" min="0" step="1000" placeholder="例如 10000">
              </label>
              <label class="discount-row" id="discountReasonRow" for="discountReasonInput" hidden>
                <span>折扣原因</span>
                <input class="field-input" id="discountReasonInput" placeholder="Manager / Owner 必填">
              </label>
              <label class="advanced-note">订单备注<input class="field-input" id="orderNoteInput" placeholder="可选"></label>
            </div>
          </details>
        </div>
        <div class="payment-confirm" id="paymentConfirm">
          <div class="qr-payment-display" id="qrPaymentDisplay" hidden><img id="qrPaymentImage" alt="QR 收款码"><strong id="qrPaymentAmount">应收 0 KIP</strong><span>确认到账后再完成收款</span></div>
          <label id="paymentReferenceRow" hidden>交易参考号<input class="field-input" id="paymentReferenceInput" placeholder="可选"></label>
          <label class="confirm-check" id="paymentConfirmedRow" hidden><input id="paymentConfirmedInput" type="checkbox"> 已确认到账</label>
          <div class="mixed-payment-grid" id="mixedPaymentGrid" hidden>
            <label>Cash<input class="field-input" id="mixedCashInput" type="number" min="0" step="1000" value="0"></label>
            <label>QR<input class="field-input" id="mixedQrInput" type="number" min="0" step="1000" value="0"></label>
            <label>Bank Transfer<input class="field-input" id="mixedTransferInput" type="number" min="0" step="1000" value="0"></label>
            <div class="mixed-total" id="mixedTotalText">合计 0 KIP</div>
          </div>
          <label id="complimentaryReasonRow" hidden>赠送原因<input class="field-input" id="complimentaryReasonInput" placeholder="顾客补偿 / 活动赠送等"></label>
        </div>
        <div class="cash-presets" id="cashPresets">
          <button class="cash-preset" data-cash="exact">刚好</button>
          <button class="cash-preset" data-cash="55000">55k</button>
          <button class="cash-preset" data-cash="110000">110k</button>
          <button class="cash-preset" data-cash="220000">220k</button>
        </div>
        <div class="cash-row">
          <input class="field-input" id="cashInput" inputmode="decimal" type="number" min="0" step="1000" placeholder="实收金额 KIP">
          <div class="change" id="changeText">找零 0 KIP</div>
        </div>
        <button class="primary" id="checkoutBtn" disabled>完成收款</button>
      </div>
    </aside>
  </div>

  <section class="shift-close-sheet" id="closeShiftSheet" hidden>
    <form class="shift-card close-shift-card" id="closeShiftForm">
      <div class="sheet-head"><div><span class="eyebrow">交班对账</span><h2>结束当前班次</h2></div><button class="ghost" id="closeShiftCancel" type="button">关闭</button></div>
      <div class="shift-summary" id="shiftCloseSummary"></div>
      <div class="shift-close-grid">
        <label>实际现金<input class="field-input" name="actual_cash" type="number" min="0" step="1000" required></label>
        <label>实际 QR 到账<input class="field-input" name="qr_actual" type="number" min="0" step="1000"></label>
        <label>实际转账<input class="field-input" name="transfer_actual" type="number" min="0" step="1000"></label>
        <label>其他实际到账<input class="field-input" name="other_actual" type="number" min="0" step="1000"></label>
        <label>天气<select class="field-input" name="weather"><option value="sunny">晴</option><option value="cloudy">多云</option><option value="light_rain">小雨</option><option value="heavy_rain">大雨</option><option value="very_hot">高温</option><option value="other">其他</option></select></label>
        <label>库存问题<input class="field-input" name="stock_issue" placeholder="无则留空"></label>
        <label>设备问题<input class="field-input" name="equipment_issue" placeholder="无则留空"></label>
        <label>特殊活动<input class="field-input" name="special_event" placeholder="无则留空"></label>
        <label class="wide-field">差异原因<input class="field-input" name="difference_note" placeholder="有差额时必填"></label>
        <label class="wide-field">交班备注<input class="field-input" name="closing_note" placeholder="可选"></label>
        <label class="wide-field">当日备注<input class="field-input" name="operation_note" placeholder="客流、天气、异常情况等"></label>
      </div>
      <button class="button primary" type="submit">确认交班</button>
    </form>
  </section>

  <div class="toast" id="toast"></div>
  <script src="config.js?v=20260714-simplified-checkout-r4"></script>
  <script src="common.js?v=20260714-simplified-checkout-r4"></script>
  <script src="pos.js?v=20260714-simplified-checkout-r4"></script>
</body>
</html>
