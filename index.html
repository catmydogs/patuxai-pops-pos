<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Patuxai Pops POS">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#f6f8fb">
  <title>Patuxai Pops POS</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/app-icon-180.png">
  <link rel="stylesheet" href="styles.css?v=20260703-force-refresh">
</head>
<body class="locked">
  <div class="install-hint" id="installHint" hidden>
    <strong>安装到 iPad</strong>
    <span>点 Safari 分享按钮，选择“添加到主屏幕”。</span>
    <button type="button" id="installHintClose" aria-label="关闭安装提示">×</button>
  </div>

  <section class="auth-screen" id="authScreen">
    <form class="auth-card" id="loginForm">
      <div>
        <h1>登录 POS</h1>
        <div class="subtle">使用 Supabase 中创建的账号登录。</div>
      </div>
      <input id="emailInput" type="email" autocomplete="username" placeholder="邮箱">
      <input id="passwordInput" type="password" autocomplete="current-password" placeholder="密码">
      <button class="button primary" type="submit">登录</button>
      <div class="auth-error" id="authError"></div>
    </form>
  </section>

  <div class="app">
    <main>
      <section class="topbar" aria-label="顶部">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div>
            <h1>Patuxai Pops POS</h1>
            <div class="subtle"><span id="todayText"></span> · <span id="signedInAs"></span> · <span class="sync-badge online" id="syncBadge">在线</span></div>
          </div>
        </div>
        <div class="toolbar">
          <input class="search" id="searchInput" type="search" placeholder="搜索商品或口味">
          <a class="ghost" href="admin.html">后台统计</a>
          <button class="ghost" id="logoutBtn">退出</button>
        </div>
      </section>

      <nav class="tabs" id="categoryTabs" aria-label="商品分类"></nav>
      <div class="stock-alert" id="lowStockAlert" hidden></div>
      <section class="grid" id="productGrid" aria-label="商品"></section>

      <section class="reports" aria-label="今日报表">
        <div class="stat"><span>今日销售额</span><strong id="salesTotal">0 KIP</strong></div>
        <div class="stat"><span>订单数</span><strong id="orderCount">0</strong></div>
        <div class="stat"><span>售出份数</span><strong id="itemCount">0</strong></div>
        <div class="stat"><span>热销</span><strong id="topItem">暂无</strong></div>
      </section>

      <section class="panel" aria-label="订单记录">
        <h2>今日订单</h2>
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>内容</th>
              <th>付款</th>
              <th>金额</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </section>
    </main>

    <aside aria-label="购物车">
      <div class="cart-head">
        <h2>当前订单</h2>
        <button class="ghost" id="clearCart">清空</button>
      </div>
      <div class="cart-list" id="cartList"></div>
      <div class="checkout">
        <div class="summary">
          <div><span>小计</span><strong id="subtotal">0 KIP</strong></div>
          <div class="total"><span>应收</span><strong id="grandTotal">0 KIP</strong></div>
        </div>
        <div class="pay-methods" id="payMethods">
          <button class="pay active" data-pay="现金">现金</button>
          <button class="pay" data-pay="扫码">扫码</button>
          <button class="pay" data-pay="其他">其他</button>
        </div>
        <div class="cash-presets" id="cashPresets">
          <button class="cash-preset" data-cash="exact">刚好</button>
          <button class="cash-preset" data-cash="55000">55k</button>
          <button class="cash-preset" data-cash="110000">110k</button>
          <button class="cash-preset" data-cash="220000">220k</button>
        </div>
        <div class="cash-row">
          <input class="field-input" id="cashInput" inputmode="decimal" type="number" min="0" step="1000" placeholder="实收金额 KIP">
          <div class="change" id="changeText">找零 0 KIP</div>
        </div>
        <button class="primary" id="checkoutBtn" disabled>完成收款</button>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast"></div>
  <script src="config.js?v=20260703-force-refresh"></script>
  <script src="common.js?v=20260703-force-refresh"></script>
  <script src="pos.js?v=20260703-force-refresh"></script>
</body>
</html>
