<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>刷新 POS 缓存</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f8fb;
      color: #17212b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(90vw, 420px);
      border: 1px solid #dce4e8;
      border-radius: 10px;
      background: #fff;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(31, 45, 61, 0.1);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    p {
      margin: 0;
      color: #6b778c;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>正在刷新 POS</h1>
    <p>请稍等，系统会清理旧缓存并自动打开新版点单页。</p>
  </main>
  <script>
    (async function () {
      try {
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }
      } catch (error) {
        // Continue to the app even if the browser blocks one cleanup step.
      }
      window.location.replace("./?v=20260712-sales-charts");
    })();
  </script>
</body>
</html>
